name: Update dashboard

# Runs in the cloud on GitHub's servers (no laptop needed). Fetches the latest World Cup
# results, recomputes scores, and publishes — but only commits when something changed.
on:
  # A long-lived supervisor (scripts/supervisor.sh) self-relaunches via CHAIN_PAT, so a live
  # process is ALWAYS running regardless of GitHub's cron (which proved unreliable — dropped 2h of
  # runs across a kickoff). Cron below is only a COLD-START backstop in case the chain ever dies.
  schedule:
    - cron: "*/30 * * * *"         # cold-start backstop (GitHub drops many; it only needs to land occasionally)
  workflow_dispatch:               # lets you (or me) trigger a run by hand anytime

permissions:
  contents: write              # allow the run to push the rebuilt site back to the repo

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 340          # supervisor holds ~5.5h then relaunches; stay under the 6h cap
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Single-instance guard (don't pile up on an already-running supervisor)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n=$(gh run list --workflow="Update dashboard" --status in_progress --json databaseId --jq 'length' 2>/dev/null || echo 1)
          if [ "$n" -gt 1 ]; then echo "another supervisor is active (n=$n) — exiting"; exit 0; fi
          echo "ACTIVE=1" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        if: env.ACTIVE == '1'
        with:
          python-version: "3.12"
      - name: Install deps (Pillow for shareable cards)
        if: env.ACTIVE == '1'
        run: python -m pip install --quiet pillow
      - name: Configure git identity
        if: env.ACTIVE == '1'
        run: |
          git config user.name "wc-lads-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch results, recompute, and publish if changed
        if: env.ACTIVE == '1'
        run: bash scripts/update.sh
      - name: Supervisor (always-on; fast during matches, self-relaunches before exit)
        if: env.ACTIVE == '1'
        env:
          CHAIN_PAT: ${{ secrets.CHAIN_PAT }}
        run: bash scripts/supervisor.sh
